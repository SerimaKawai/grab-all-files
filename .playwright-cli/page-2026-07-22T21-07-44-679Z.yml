      - generic [ref=f2e165]:
        - generic [ref=f2e166]: 最新バージョン
        - strong [ref=f2e167]: 5.1.5
      - generic [ref=f2e168]:
        - heading "複雑なページでも、より多くのファイルを見つけやすく。" [level=3] [ref=f2e169]
        - paragraph [ref=f2e170]: 最新のWebに合わせて設計し、こまめに更新しています。現在のリリースでは、深い検出、同一サイト収集、大量ダウンロード後のローカル出力機能を重点的に整理しています。
        - list [ref=f2e171]:
          - listitem [ref=f2e172]: iframe内PDF、遅延画像、fetch/XHRファイル、blob URL、CMSダウンロードルートの検出を強化。
          - listitem [ref=f2e173]: 新機能：分割・マルチボリュームアーカイブの連番（.000/.001…、WinRAR .r00/.s00、WinZip .z01）を検出し、圧縮アーカイブとしてまとめます。
          - listitem [ref=f2e174]: サブページ、ビューアURL、検索/ページャリンク、CMS文書ルートまで同一サイトクロールで到達。
          - listitem [ref=f2e175]: PDF結合、ZIP化、CSV出力はブラウザ内で完結し、ファイルをアップロードしません。
    - generic [ref=f2e177]:
      - generic [ref=f2e178]: 研究者
      - generic [ref=f2e184]: 公開資料の収集
      - generic [ref=f2e189]: 社内ポータル利用者
      - generic [ref=f2e194]: 学生
