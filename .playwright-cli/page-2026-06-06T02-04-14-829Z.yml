    - article [ref=e57]:
      - generic [ref=e58]:
        - heading "プライバシーポリシー" [level=1] [ref=e59]
        - paragraph [ref=e60]: "最終更新日: 2026年5月4日"
        - paragraph [ref=e61]:
          - strong [ref=e62]: "ファイル一括ダウンロード（英文表記: Grab All Files）"
          - text: （以下「本拡張機能」）は、ユーザーが選択したWebページからファイルを検索・確認・ダウンロードし、必要に応じてPDFをローカル結合できるブラウザ拡張機能です。本ポリシーでは、本拡張機能が取り扱うデータ、その利用目的、保存先、送信される場面について説明します。
        - heading "1. データ取り扱いの概要" [level=2] [ref=e63]
        - paragraph [ref=e64]: 本拡張機能は、個人データの販売、サードパーティ分析、広告挿入、トラッキングスクリプトの利用を行いません。また、公開ストア配布版では、エラー報告・クラッシュ報告・テレメトリの送信も一切行いません。ユーザー向け機能を提供するため、ブラウザ内で限定的な閲覧関連データをローカル処理します。
        - paragraph [ref=e65]: たとえば、以下のようなデータを扱います：
        - list [ref=e66]:
          - listitem [ref=e67]: スキャン対象としてユーザーが選択した現在のタブまたは入力したURL
          - listitem [ref=e68]: クイックアクセスのために端末内へ保存される最近のスキャン履歴
          - listitem [ref=e69]:
            - strong [ref=e70]: ネットワークファイル記録
            - text: （ネットワーク監視で検出されたファイルのURLとメタデータ）のセッション中の一時保存
        - paragraph [ref=e71]: スキャン履歴、ページHTML、ファイル内容、閲覧行動を当社サーバーへ送信することはありません。
        - paragraph [ref=e72]:
          - strong [ref=e73]: トライアルと有料ライセンス：
          - text: 本拡張機能には14日間の無料トライアルがあります。トライアル終了後も継続利用するには、有料ライセンスキーが必要です。トライアル資格確認、ライセンス有効化、ライセンス更新、デバイス台数制限、失効確認は、ランダムなデバイスUUIDと、該当する場合はライセンスキーを使用して、ライセンスバックエンドで処理されます。
        - paragraph [ref=e74]:
          - strong [ref=e75]: Webサイトへのアクセス：
          - text: 本拡張機能は、ユーザーが任意のWebサイトをスキャン対象として選択でき、対象ドメインを事前に特定できないため、
          - code [ref=e76]: https://*/*
          - text: へのアクセス権限を要求します。この権限は、ユーザーが選択したページまたはURL上のダウンロード可能リンクやファイルレスポンスを検出し、ユーザーが選択したファイルをダウンロードするために使用されます。ページHTML、閲覧行動、ファイル内容を当社サーバーへ送信するためには使用しません。
        - heading "2. ネットワークリクエスト" [level=2] [ref=e77]
        - paragraph [ref=e78]: 本拡張機能が行うネットワークリクエストは、次の目的に限られます：
        - list [ref=e79]:
          - listitem [ref=e80]:
            - strong [ref=e81]: ライセンス認証
            - text: — ライセンスキーの入力時または再検証時に、ライセンスキーとランダム生成されたデバイス識別子（UUID）を当社サーバーへ送信し、ライセンスの有効性とデバイス数制限を確認します。
          - listitem [ref=e82]:
            - strong [ref=e83]: ライセンストークン（JWT）の発行と更新
            - text: — 認証成功後、当社サーバーは短期有効な署名付きアクセストークン（ES256 JWT、有効期間7日）を返します。このトークンにはライセンスキー、デバイス識別子、付与された機能、有効期限が含まれます。本拡張機能はこのトークンを端末内にキャッシュし、その後のライセンス確認の大半をオフラインで処理します。トークンは通常1日1回、同じライセンスキーとデバイス識別子を当社サーバーへ送信して更新されます。
          - listitem [ref=e84]:
            - strong [ref=e85]: 失効リストの更新
            - text: — 1日1回、失効済みトークンID（ライセンスキーは含みません）の小さな署名付きリストをダウンロードし、オフラインでも24時間以内に失効を反映できるようにします。このリクエストにはユーザー識別情報を一切送信しません。
          - listitem [ref=e86]:
            - strong [ref=e87]: トライアル認証
            - text: — 無料トライアル期間中に、デバイス識別子（UUID）を当社サーバーへ送信し、トライアル利用資格を確認します。
          - listitem [ref=e88]:
            - strong [ref=e89]: デバイス管理
            - text: — ライセンス画面で有効化済みデバイスを表示または削除する際に、ライセンスキー、現在のデバイス識別子、および削除時には対象デバイス識別子を当社サーバーへ送信します。
          - listitem [ref=e90]:
            - strong [ref=e91]: ユーザーが指定したWebサイトへのアクセス
            - text: — ページのスキャン、URL入力、ファイルメタデータ取得、ファイルダウンロード、PDF結合時に、本拡張機能はユーザーが選択した対象Webサイトへ直接接続します。これらのリクエストは当社サーバーを経由しません。
        - paragraph [ref=e92]: 対象Webサイトへのリクエストには、そのサイトのコンテンツ取得に必要な場合、ブラウザセッションに既に紐づいているCookieやその他のセッション資格情報が含まれることがあります。本拡張機能がそれらの情報を別途収集・複製・販売することはありません。
        - heading "3. 端末に保存されるデータ" [level=2] [ref=e93]
        - paragraph [ref=e94]:
          - text: 本拡張機能は、
          - code [ref=e95]: chrome.storage.local
          - text: および
          - code [ref=e96]: chrome.storage.session
          - text: を使って以下のデータをローカル保存します。ライセンス関連の通信を除き、これらのデータは端末の外へ送信されません。
