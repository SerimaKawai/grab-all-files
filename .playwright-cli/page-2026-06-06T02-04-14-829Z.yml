                - text: ユーザーが選択した任意のWebサイトをスキャンし、
                - code [ref=e190]: https://umczaaooqinddgnhxbvp.supabase.co/*
                - text: のライセンス認証・トライアル認証バックエンドへ接続するため。対象ドメインは、ユーザーがページを選択またはURLを入力するまで事前に特定できないため、広いHTTPSホスト権限が必要です。この権限は、選択されたサイト上のダウンロード可能リンク、ページ内 fetch/XHR ファイルレスポンス、ファイルメタデータ、選択ファイルのダウンロード、ライセンス/トライアル確認に使用されます。スキャン履歴、ページHTML、閲覧行動、ファイル内容を当社サーバーへ送信することはありません。
        - heading "5. 閲覧関連データの利用方法" [level=2] [ref=e191]
        - paragraph [ref=e192]: 本拡張機能は、閲覧関連データやWebサイトのコンテンツを、現在ページのスキャン、入力URLのスキャン、最近のスキャン表示、ファイルメタデータ確認、選択ファイルのダウンロード、PDFのローカル結合というユーザー向け機能のためにのみ使用します。
        - list [ref=e193]:
          - listitem [ref=e194]:
            - text: これらのデータを
            - strong [ref=e195]: 販売しません
            - text: 。
          - listitem [ref=e196]:
            - text: これらのデータを広告、プロファイリング、分析目的で
            - strong [ref=e197]: 利用しません
            - text: 。
          - listitem [ref=e198]:
            - text: これらのデータをデータブローカー、情報再販業者、広告プラットフォームへ
            - strong [ref=e199]: 提供しません
            - text: 。
          - listitem [ref=e200]:
            - text: スキャン履歴、ページHTML、ファイル内容を当社サーバーへ
            - strong [ref=e201]: 送信しません
            - text: 。
        - paragraph [ref=e202]: これらのデータ利用は、本拡張機能の単一目的および Chrome Web Store™ の説明文と拡張機能UIに記載されたユーザー向け機能の提供に限定されます。
        - paragraph [ref=e203]:
          - strong [ref=e204]: "Chrome Web Store User Data Policy / Limited Use:"
          - text: 本拡張機能は、Limited Use 要件を含む Chrome Web Store User Data Policy に準拠します。
        - heading "5a. テレメトリ・分析・エラー報告" [level=2] [ref=e205]
        - paragraph [ref=e206]:
          - text: 公開ストア配布版は、エラー報告、クラッシュ報告、性能指標、その他のテレメトリを当社サーバーまたは第三者のテレメトリ事業者へ
          - strong [ref=e207]: 一切送信しません
          - text: 。Google Analytics、Mixpanel、Amplitude、Segment などの SDK は含まれていません。
        - paragraph [ref=e208]: ソースコード上には、社内デバッグビルド向けの任意のエラー報告フック（Sentry）が存在しますが、ビルド時のシークレットでゲートされており、Chrome Web Store™、Microsoft Edge™ Add-ons および Firefox Add-ons で配布されるビルドでは無効化されています。将来のリリースで有効化する場合は、配布前に本プライバシーポリシーを更新します。仮に有効化される場合でも、送信されるデータからはライセンスキー、メールアドレス、JWT、Bearerトークン、UUID、クエリ文字列の値、ファイルシステムパス、URLパス本体が事前に redact されます。
        - heading "5b. ウェブサイトのアクセス解析（grab-all-files.app）" [level=2] [ref=e209]
        - paragraph [ref=e210]:
          - text: マーケティングサイト
          - code [ref=e211]: grab-all-files.app
          - text: （本拡張機能本体とは別）では、アクセス傾向、流入元、訪問されたページや購入フローの到達状況を集計するために
          - strong [ref=e212]: Google Analytics 4
          - text: （gtag.js）を使用しています。これはウェブサイト訪問時のみ動作し、拡張機能内では一切動作しません。
        - list [ref=e213]:
          - listitem [ref=e214]:
            - strong [ref=e215]: 収集するもの：
            - text: ページURL、ページタイトル、リファラー、IPから推定される市区町村レベルの大まかな位置情報、デバイス種別、ブラウザ、言語、集計イベント数（例：
            - emphasis [ref=e216]: page_view
            - text: 、Stripe決済完了後の
            - emphasis [ref=e217]: purchase
            - text: ）。
          - listitem [ref=e218]:
            - strong [ref=e219]: 収集しないもの：
            - text: 氏名、メールアドレス、ライセンスキー、決済情報、拡張機能内で入力されたデータは一切含まれません。purchase イベントには Stripe Checkout のセッションID（重複排除用）、カタログ価格、通貨のみが含まれ、カード情報やメールアドレスは含まれません。
          - listitem [ref=e220]:
            - strong [ref=e221]: EU/EEA・英国・スイス：
            - text: Google Consent Mode v2 により、
            - emphasis [ref=e222]: analytics_storage
            - text: および広告関連シグナルは既定で
            - strong [ref=e223]: 拒否（denied）
            - text: となります。同意取得まで Google へは識別子を含まない Cookie レス pings のみが送信されます。広告タグは導入していません。
          - listitem [ref=e224]:
            - strong [ref=e225]: 法的根拠（GDPR 第6条）：
            - text: 識別性のないシグナルでウェブサイトのパフォーマンスを集計把握することへの正当な利益（第6条1項(f)）。同意が法的に必要となる地域では、Consent Mode を通じて伝達されるブラウザ／地域設定上の同意に依拠します。
          - listitem [ref=e226]:
            - strong [ref=e227]: オプトアウト方法：
            - text: ブラウザの
            - emphasis [ref=e228]: Do Not Track
            - text: / プライバシー設定の有効化、コンテンツブロッカーの利用、または
            - link "Google アナリティクス オプトアウト アドオン" [ref=e229] [cursor=pointer]:
              - /url: https://tools.google.com/dlpage/gaoptout
            - text: のインストール。
        - heading "6. 処理の法的根拠（GDPR 第6条）" [level=2] [ref=e230]
        - paragraph [ref=e231]: EU/EEA内のユーザーについて、該当する場合は以下の法的根拠に基づいて処理を行います：
        - list [ref=e232]:
          - listitem [ref=e233]:
            - strong [ref=e234]: 契約の履行
            - text: （第6条1項(b)） — 有料ライセンスの認証、トライアル資格確認、デバイス台数制限の実施。
          - listitem [ref=e235]:
            - strong [ref=e236]: 正当な利益
            - text: （第6条1項(f)） — 端末上で拡張機能の基本機能を提供するために必要なローカル設定および最近のスキャン履歴の保存。
        - heading "7. サードパーティサービスと国際データ移転" [level=2] [ref=e237]
        - paragraph [ref=e238]:
          - text: 本拡張機能は、ライセンス認証、トライアル認証、デバイス管理のために
          - strong [ref=e239]: Supabase
          - text: 上のバックエンドを利用します。Supabase は当社のインフラ提供者です。当社は、本拡張機能のユーザーデータを無関係な第三者へ販売または開示しません。
        - paragraph [ref=e240]:
          - text: Supabase のインフラは Amazon Web Services（AWS）上で運用されています。当社バックエンドへ送信されるデータは、EU/EEA外で処理される場合があります。Supabase は国際データ移転について
          - strong [ref=e241]: 標準契約条項（SCC）
          - text: に依拠すると説明しています。詳細は
          - link "Supabase のプライバシーポリシー" [ref=e242] [cursor=pointer]:
            - /url: https://supabase.com/privacy
          - text: をご確認ください。
        - heading "8. 保持期間と削除" [level=2] [ref=e243]
        - list [ref=e244]:
          - listitem [ref=e245]: ライセンス、デバイス、トライアル関連のバックエンド記録は、ライセンス/トライアル制度の運用に必要な期間、通常はライセンス有効期間中保持されます。削除請求があれば対応します。
          - listitem [ref=e246]:
            - text: バックエンド記録の削除請求には
            - strong [ref=e247]: 30日以内
            - text: に対応します。
          - listitem [ref=e248]: 最近のスキャン履歴はローカルに最大20件まで保存されます。
          - listitem [ref=e249]: Session ストレージはブラウザセッション終了時に消去されます。
          - listitem [ref=e250]: 拡張機能をアンインストールすると、ブラウザ管理下のローカル保存データは削除されます。
        - heading "9. お客様の権利（EU/EEAユーザー）" [level=2] [ref=e251]
        - paragraph [ref=e252]: GDPRに基づき、当社が管理するデータについて次の権利を有する場合があります：
        - list [ref=e253]:
          - listitem [ref=e254]:
            - strong [ref=e255]: アクセス権
            - text: — 当社が保有するデータのコピーを請求できます。
          - listitem [ref=e256]:
            - strong [ref=e257]: 訂正権
            - text: — 不正確なデータの訂正を請求できます。
          - listitem [ref=e258]:
            - strong [ref=e259]: 消去権
            - text: — 当社が保有するデータの削除を請求できます。
          - listitem [ref=e260]:
            - strong [ref=e261]: 処理制限権
            - text: — データ利用の制限を請求できます。
          - listitem [ref=e262]:
            - strong [ref=e263]: データポータビリティ権
            - text: — 機械可読形式でのデータ提供を請求できます。
          - listitem [ref=e264]:
            - strong [ref=e265]: 異議申立権
            - text: — 正当な利益に基づく処理へ異議を申し立てることができます。
          - listitem [ref=e266]:
            - strong [ref=e267]: 監督機関への苦情申立権
            - text: — お住まいの地域のデータ保護機関に苦情を申し立てることができます。
        - paragraph [ref=e268]:
          - text: これらの権利を行使する場合は、
          - link "support@grab-all-files.app" [ref=e269] [cursor=pointer]:
            - /url: mailto:support@grab-all-files.app
          - text: までご連絡ください。
          - strong [ref=e270]: 30日以内
          - text: に回答いたします。
        - heading "10. 児童のプライバシー" [level=2] [ref=e271]
        - paragraph [ref=e272]: 本拡張機能は16歳未満（またはお住まいの地域で適用される年齢未満）の児童を対象としておらず、児童の個人情報を故意に収集しません。
        - heading "11. 本ポリシーの変更" [level=2] [ref=e273]
        - paragraph [ref=e274]: 本プライバシーポリシーは随時更新される場合があります。変更がある場合は、このページに更新日とともに掲載します。
        - heading "11a. 法域別の越境データ移転および消費者プライバシー開示" [level=2] [ref=e275]
        - paragraph [ref=e276]:
          - strong [ref=e277]: 欧州連合 / EEA（GDPR）。
          - text: 法的根拠は前記第6条をご参照ください。AWS（米国）および当方（日本）への国際移転 — いずれも EU の十分性決定の対象外です — は、Supabase との データ処理契約に組み込まれた標準契約条項（規則 (EU) 2021/914）に基づき行われます。データ主体は所属国の監督機関（DPA）に苦情を申し立てることができます：ドイツ —
          - link "BfDI" [ref=e278] [cursor=pointer]:
            - /url: https://www.bfdi.bund.de
          - text: ；フランス —
          - link "CNIL" [ref=e279] [cursor=pointer]:
            - /url: https://www.cnil.fr
          - text: ；スペイン —
          - link "AEPD" [ref=e280] [cursor=pointer]:
            - /url: https://www.aepd.es
          - text: ；イタリア —
          - link "Garante per la protezione dei dati personali" [ref=e281] [cursor=pointer]:
            - /url: https://www.gpdp.it
          - text: 。
        - paragraph [ref=e282]:
          - strong [ref=e283]: ブラジル（LGPD Lei 13.709/2018）。
          - text: ブラジルのユーザーの個人データ（ライセンスキー、デバイス UUID、メールアドレス）は、Supabase Inc.（米国、AWS ホスティング）および当方（日本）へ移転されます。いずれの国も現時点で ANPD の十分性決定を受けていません。当該移転は次の根拠により行われます：(a) LGPD 第33条 VIII 号 — お客様が締結したライセンス契約の履行に必要、(b) LGPD 第33条 II 号 — Resolução CD/ANPD nº 19/2024 で承認された標準契約条項を当方の処理者契約に変更なく組み込み。ブラジルのデータ主体は LGPD 第18条に基づく権利（acesso、correção、anonimização、eliminação、portabilidade、oposição、revogação de consentimento）を
          - link "support@grab-all-files.app" [ref=e284] [cursor=pointer]:
            - /url: mailto:support@grab-all-files.app
          - text: までメールで行使でき、ANPD（
          - link "www.gov.br/anpd" [ref=e285] [cursor=pointer]:
            - /url: https://www.gov.br/anpd
          - text: ）に苦情を申し立てることもできます。
        - paragraph [ref=e286]:
          - strong [ref=e287]: 大韓民国（개인정보 보호법 / PIPA）。
          - text: AWS（米国）および当方（日本）への越境移転は、PIPA 第28條의8 第1項 第3號（データ主体との契約履行に必要）に基づき行われ、第28條의8 第2項 が要求する次の事項を開示します：(i)
          - emphasis [ref=e288]: 移転項目
          - text: ：ライセンスキー、ランダム生成のデバイス UUID、メールアドレス、ライセンス発行時刻、(ii)
          - emphasis [ref=e289]: 受領者
          - text: ：Supabase Inc.（米国、AWS ホスティング）および Serima Kawai（日本）、(iii)
          - emphasis [ref=e290]: 受領国
          - text: ：米国、日本、(iv)
          - emphasis [ref=e291]: 移転日・方法
          - text: ：ライセンス有効化／検証時に HTTPS API リクエスト経由、(v)
          - emphasis [ref=e292]: 目的
          - text: ：ライセンス検証、デバイス数制限、失効処理、(vi)
          - emphasis [ref=e293]: 保有期間
          - text: ：ライセンス有効期間 + 削除請求から30日間、(vii)
          - emphasis [ref=e294]: プライバシー連絡先
          - text: ：
          - link "support@grab-all-files.app" [ref=e295] [cursor=pointer]:
            - /url: mailto:support@grab-all-files.app
          - text: 。개인정보 보호책임자 は Serima Kawai であり、同メールアドレスで連絡可能です。韓国のデータ主体は 개인정보보호위원회（PIPC、
          - link "www.pipc.go.kr" [ref=e296] [cursor=pointer]:
            - /url: https://www.pipc.go.kr
          - text: ）または 한국인터넷진흥원（KISA）の e-Privacy Clean Service に苦情を申し立てることができます。
        - paragraph [ref=e297]:
          - strong [ref=e298]: 中華人民共和国（《个人信息保护法》/ PIPL）。
          - text: AWS（米国）および当方（日本）への越境移転は、PIPL 第13条第2号（データ主体との契約締結・履行に必要）と、ライセンス有効化時に取得する同意に基づき行われます。PIPL 第39条が要求する次の事項を開示します：(i)
          - emphasis [ref=e299]: 海外受領者
          - text: ：Supabase Inc.（米国）、Serima Kawai（日本）、(ii)
          - emphasis [ref=e300]: 連絡先
          - text: ：
          - link "support@grab-all-files.app" [ref=e301] [cursor=pointer]:
            - /url: mailto:support@grab-all-files.app
          - text: 、(iii)
          - emphasis [ref=e302]: 処理目的
          - text: ：ライセンス検証、デバイス数制限、失効処理、(iv)
          - emphasis [ref=e303]: 処理方法
          - text: ：HTTPS API による保存・参照、(v)
          - emphasis [ref=e304]: データ主体の権利
          - text: ：アクセス、訂正、削除、制限、同意の撤回 — 上記メールから行使可能。PIPL 第53条が要求する場合、当方は適用されるユーザー数の閾値に達した時点で中国国内代理人を指定します。中国の消費者は 12315 プラットフォーム（
          - link "www.12315.cn" [ref=e305] [cursor=pointer]:
            - /url: https://www.12315.cn
          - text: ）から苦情を申し立てることができます。
        - paragraph [ref=e306]:
          - strong [ref=e307]: 台湾（個人資料保護法 / PDPA）。
          - text: AWS-US および日本（当方）への越境移転は、PDPA 第8條（告知義務）に基づき開示するものであり、現時点では 第21條 に基づく中央目的事業主管機關による制限の対象ではありません。収集データ、目的、保有期間、受領者および移転に関する権利は前述のとおりです。台湾のデータ主体は、個人資料保護委員會（正式設置後）または当面の間は所管の中央目的事業主管機關、もしくは 行政院消費者保護會（
          - link "cpc.ey.gov.tw" [ref=e308] [cursor=pointer]:
            - /url: https://cpc.ey.gov.tw
          - text: ）に苦情を申し立てることができます。
        - generic [ref=e309]:
          - heading "12. お問い合わせ / データ管理者" [level=2] [ref=e310]
          - paragraph [ref=e311]:
            - strong [ref=e312]: "データ管理者:"
