    - generic [ref=e163]:
      - generic [ref=e164]:
        - generic [ref=e165]: 主な機能
        - generic [ref=e166]:
          - heading "主な機能" [level=2] [ref=e167]
          - paragraph [ref=e168]: 複数ページから資料を集める人のためのツールです。調査・研究、自治体・大学公開資料の収集、社内ポータル業務、デザイン素材集め、論文・教材ダウンロードなど、「保存」を何度もクリックする作業から解放します。
      - generic [ref=e170]:
        - generic [ref=e171]:
          - generic [ref=e172]: 🔎
          - heading "見落としがちなファイルも検出" [level=3] [ref=e173]
          - paragraph [ref=e174]: iframe内のPDF、遅延読み込み画像、fetch/XHRで取得されるファイル、blob URL、CMSダウンロードルート、hidden inputの値、30種類以上のdata-*属性まで網羅。通常のリンクスクレイパーでは拾えないファイルも検出します。さらにShadow DOM／Web Components内、SPAのハイドレーションデータ（Next.js・JSON-LD）、Cache Storage／OPFS／IndexedDB、署名付きクラウドストレージURL（Cloudflare R2・Firebase・Supabase・Vercel Blob）まで踏み込んで検出します。
        - generic [ref=e175]:
          - generic [ref=e176]: ⚙️
          - heading "スマートフィルタ" [level=3] [ref=e177]
          - paragraph [ref=e178]: 拡張子、ファイルサイズ、ファイル名、ページタイトル、更新日で絞り込み・並べ替え・手動並べ替え。URLのプレーンテキストコピーにも対応。
        - generic [ref=e179]:
          - generic [ref=e180]: 🕸️
          - heading "同一サイトクロール" [level=3] [ref=e181]
          - paragraph [ref=e182]: 深度0〜5または無制限を選んで、同一ドメインのリンク先を巡回。サブページに散らばったPDF、ビューアURL、CMS文書ルートまで一気に収集。1回の実行で最大1万ページまで。さらに sitemap.xml／robots.txt を解析し、JavaScriptメニュー（javascript:／onclick）・フレームセット・イメージマップ・GET検索/ページャのリンクも辿るので、通常の<a>リンクが無いページにも到達します。
        - generic [ref=e183]:
          - generic [ref=e184]: 📚
          - heading "PDF結合（ローカル）" [level=3] [ref=e185]
          - paragraph [ref=e186]: 選択したPDFを1つにまとめます。アップロード不要・サーバー送信なし。ファイルは端末から外に出ません。
        - generic [ref=e187]:
          - generic [ref=e188]: 🗜️
          - heading "ZIP化" [level=3] [ref=e189]
          - paragraph [ref=e190]: 選択したファイルを1つのZIPにまとめて配布・アーカイブ・共有しやすく。ブラウザ内ですべて完結します。
        - generic [ref=e191]:
          - generic [ref=e192]: 📊
          - heading "CSV出力" [level=3] [ref=e193]
          - paragraph [ref=e194]: URL、ファイル名、サイズ、種類、タイトルをCSV出力。資料台帳、棚卸し、報告書、後続の自動処理にそのまま使えます。
        - generic [ref=e195]:
          - generic [ref=e196]: 🔐
          - heading "アクセス権のあるページをスキャン" [level=3] [ref=e197]
          - paragraph [ref=e198]: お使いのブラウザのセッションを利用し、すでに正当に開ける社内ポータル、LMS、会員ページ内の資料を確認できます。認証情報を収集したり、アクセス制御を回避したりするものではありません。
        - generic [ref=e199]:
          - generic [ref=e200]: 🛡️
          - heading "複雑なページにも対応" [level=3] [ref=e201]
          - paragraph [ref=e202]: 正当にアクセスできるページ内であれば、JavaScript描画のSPA（React・Next・Nuxt・Vue）、ビューア経由のURL、CSRF保護フォームなど、通常のダウンローダーが取りこぼす経路も確認します。種別は拡張子だけでなくバイト署名でも判定し、HTTP（非HTTPS）の旧サイトもスキャンできます。
        - generic [ref=e203]:
          - generic [ref=e204]: ⚙️
          - heading "大量処理に対応" [level=3] [ref=e205]
          - paragraph [ref=e206]: 複数URLを一度にスキャン、またはサイト全体をクロール。並列数の調整、一時停止/再開、失敗の自動リトライ、種類別・ドメイン別のフォルダ仕分け、PDFタイトルからのファイル名変更まで。
