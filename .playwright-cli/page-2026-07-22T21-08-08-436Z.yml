    - generic [ref=f7e164]:
      - generic [ref=f7e165]:
        - generic [ref=f7e166]: 最新バージョン
        - strong [ref=f7e167]: 5.1.5
      - generic [ref=f7e168]:
        - heading "複雑なページでも、より多くのファイルを見つけやすく。" [level=3] [ref=f7e169]
        - paragraph [ref=f7e170]: 最新のWebに合わせて設計し、こまめに更新しています。現在のリリースでは、深い検出、同一サイト収集、大量ダウンロード後のローカル出力機能を重点的に整理しています。
        - list [ref=f7e171]:
          - listitem [ref=f7e172]: iframe内PDF、遅延画像、fetch/XHRファイル、blob URL、CMSダウンロードルートの検出を強化。
          - listitem [ref=f7e173]: 新機能：分割・マルチボリュームアーカイブの連番（.000/.001…、WinRAR .r00/.s00、WinZip .z01）を検出し、圧縮アーカイブとしてまとめます。
          - listitem [ref=f7e174]: サブページ、ビューアURL、検索/ページャリンク、CMS文書ルートまで同一サイトクロールで到達。
          - listitem [ref=f7e175]: PDF結合、ZIP化、CSV出力はブラウザ内で完結し、ファイルをアップロードしません。
    - generic [ref=f7e177]:
      - generic [ref=f7e178]: 研究者
      - generic [ref=f7e184]: 公開資料の収集
      - generic [ref=f7e189]: 社内ポータル利用者
      - generic [ref=f7e194]: 学生
