    - generic [ref=f7e209]:
      - generic [ref=f7e210]:
        - generic [ref=f7e211]: 主な機能
        - generic [ref=f7e212]:
          - heading "主な機能" [level=2] [ref=f7e213]
          - paragraph [ref=f7e214]: 複数ページから資料を集める人のためのツールです。調査・研究、自治体・大学公開資料の収集、社内ポータル業務、デザイン素材集め、論文・教材ダウンロードなど、「保存」を何度もクリックする作業から解放します。
      - generic [ref=f7e216]:
        - generic [ref=f7e217]:
          - heading "見落としがちなファイルも検出" [level=3] [ref=f7e222]
          - paragraph [ref=f7e223]:
            - strong [ref=f7e224]: 708種類（拡張子）
            - text: のファイルに対応。iframe内のPDF、遅延読み込み画像、fetch/XHRで取得されるファイル、blob URL、CMSダウンロードルート、hidden inputの値、39種類のdata-*属性まで網羅。通常のリンクスクレイパーでは拾えないファイルも検出します。さらにShadow DOM／Web Components内、SPAのハイドレーションデータ（Next.js・JSON-LD）、Cache Storage／OPFS／IndexedDB、署名付きクラウドストレージURL（Cloudflare R2・Firebase・Supabase・Vercel Blob）まで踏み込んで検出します。
        - generic [ref=f7e225]:
          - heading "スマートフィルタ" [level=3] [ref=f7e231]
          - paragraph [ref=f7e232]: 拡張子、ファイルサイズ、ファイル名、ページタイトル、更新日で絞り込み・並べ替え・手動並べ替え。URLのプレーンテキストコピーにも対応。
        - generic [ref=f7e233]:
          - heading "同一サイトクロール" [level=3] [ref=f7e241]
          - paragraph [ref=f7e242]: 深度0〜5または無制限を選んで、同一ドメインのリンク先を巡回。サブページに散らばったPDF、ビューアURL、CMS文書ルートまで一気に収集。1回の実行で最大10万ページまで。さらに sitemap.xml／robots.txt を解析し、JavaScriptメニュー（javascript:／onclick）・フレームセット・イメージマップ・GET検索/ページャのリンクも辿るので、通常の<a>リンクが無いページにも到達します。
        - generic [ref=f7e243]:
          - heading "PDF結合（ローカル）" [level=3] [ref=f7e249]
          - paragraph [ref=f7e250]: 選択したPDFを1つにまとめます。アップロード不要・サーバー送信なし。ファイルは端末から外に出ません。
        - generic [ref=f7e251]:
          - heading "ZIP化" [level=3] [ref=f7e256]
          - paragraph [ref=f7e257]: 選択したファイルを1つのZIPにまとめて配布・アーカイブ・共有しやすく。ブラウザ内ですべて完結します。
        - generic [ref=f7e258]:
          - heading "CSV出力" [level=3] [ref=f7e264]
          - paragraph [ref=f7e265]: URL、ファイル名、サイズ、種類、タイトルをCSV出力。資料台帳、棚卸し、報告書、後続の自動処理にそのまま使えます。
        - generic [ref=f7e266]:
          - heading "アクセス権のあるページをスキャン" [level=3] [ref=f7e272]
          - paragraph [ref=f7e273]: お使いのブラウザのセッションを利用し、すでに正当に開ける社内ポータル、LMS、会員ページ内の資料を確認できます。認証情報を収集したり、アクセス制御を回避したりするものではありません。
        - generic [ref=f7e274]:
          - heading "複雑なページにも対応" [level=3] [ref=f7e279]
          - paragraph [ref=f7e280]: 正当にアクセスできるページ内であれば、JavaScript描画のSPA（React・Next・Nuxt・Vue）、ビューア経由のURL、CSRF保護フォームなど、通常のダウンローダーが取りこぼす経路も確認します。種別は拡張子だけでなくバイト署名でも判定し、HTTP（非HTTPS）の旧サイトもスキャンできます。
        - generic [ref=f7e281]:
          - heading "大量処理に対応" [level=3] [ref=f7e287]
          - paragraph [ref=f7e288]: 複数URLを一度にスキャン、またはサイト全体をクロール。並列数の調整、一時停止/再開、失敗の自動リトライ、種類別・ドメイン別のフォルダ仕分け、PDFタイトルからのファイル名変更まで。
    - generic [ref=f7e290]:
      - generic [ref=f7e291]:
        - generic [ref=f7e292]: 使いどころ
        - generic [ref=f7e293]:
          - heading "他のダウンロードツールとの使い分け" [level=2] [ref=f7e294]
          - paragraph [ref=f7e295]: Grab All Files は万能ツールではなく、「複雑・動的・ログイン必須のページからファイルを見つける」ことに特化しています。ダウンロードマネージャやサイト複製ツールとの役割分担はこうです。
      - generic [ref=f7e297]:
        - generic [ref=f7e298]:
          - heading "複雑・ログイン必須ページからファイルを発見" [level=3] [ref=f7e303]
          - paragraph [ref=f7e304]:
            - text: iframe・ビューア・JavaScript・ログイン・CMSルートの奥に隠れたPDF・画像・文書。Grab All Files が検出し、絞り込み・選択のうえ、一括DL・PDF結合・ZIP化・CSV出力までローカルで完結します。
            - strong [ref=f7e305]: これこそ Grab All Files の得意分野です。
        - generic [ref=f7e306]:
          - generic [ref=f7e307]: 🚚
          - heading "既知のURLを大量に／巨大ファイルをDL" [level=3] [ref=f7e308]
          - paragraph [ref=f7e309]: 数GBのファイルや、キュー管理・再開が必要な長時間の無人バッチには、専用のダウンロードマネージャ（JDownloader、aria2）が最適です。Grab All Files でファイルを発見してURLリストを書き出し、重いDLはそちらに任せましょう。
        - generic [ref=f7e310]:
          - generic [ref=f7e311]: 🗺️
          - heading "サイト全体をオフライン閲覧用に複製" [level=3] [ref=f7e312]
          - paragraph [ref=f7e313]: 静的サイトを HTML・リンク・構造ごと複製してオフラインで閲覧したいなら、サイト複製ツール（HTTrack など）が適任です。Grab All Files が集めるのはファイルであり、サイトそのものの複製ではありません。
