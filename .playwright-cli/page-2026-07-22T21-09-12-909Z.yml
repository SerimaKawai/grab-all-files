    - generic [ref=f17e164]:
      - generic [ref=f17e165]:
        - generic [ref=f17e166]: 最新バージョン
        - strong [ref=f17e167]: 5.1.5
      - generic [ref=f17e168]:
        - heading "複雑なページでも、より多くのファイルを見つけやすく。" [level=3] [ref=f17e169]
        - paragraph [ref=f17e170]: 最新のWebに合わせて設計し、こまめに更新しています。現在のリリースでは、深い検出、同一サイト収集、大量ダウンロード後のローカル出力機能を重点的に整理しています。
        - list [ref=f17e171]:
          - listitem [ref=f17e172]: iframe内PDF、遅延画像、fetch/XHRファイル、blob URL、CMSダウンロードルートの検出を強化。
          - listitem [ref=f17e173]: 新機能：分割・マルチボリュームアーカイブの連番（.000/.001…、WinRAR .r00/.s00、WinZip .z01）を検出し、圧縮アーカイブとしてまとめます。
          - listitem [ref=f17e174]: サブページ、ビューアURL、検索/ページャリンク、CMS文書ルートまで同一サイトクロールで到達。
          - listitem [ref=f17e175]: PDF結合、ZIP化、CSV出力はブラウザ内で完結し、ファイルをアップロードしません。
    - generic [ref=f17e177]:
      - generic [ref=f17e178]: 研究者
      - generic [ref=f17e184]: 公開資料の収集
      - generic [ref=f17e189]: 社内ポータル利用者
      - generic [ref=f17e194]: 学生
      - generic [ref=f17e200]: デザイナー
    - generic [ref=f17e209]:
      - generic [ref=f17e210]:
        - generic [ref=f17e211]: 主な機能
        - generic [ref=f17e212]:
          - heading "主な機能" [level=2] [ref=f17e213]
          - paragraph [ref=f17e214]: 複数ページから資料を集める人のためのツールです。調査・研究、自治体・大学公開資料の収集、社内ポータル業務、デザイン素材集め、論文・教材ダウンロードなど、「保存」を何度もクリックする作業から解放します。
      - generic [ref=f17e216]:
        - generic [ref=f17e217]:
          - heading "見落としがちなファイルも検出" [level=3] [ref=f17e222]
          - paragraph [ref=f17e223]:
            - strong [ref=f17e224]: 708種類（拡張子）
            - text: のファイルに対応。iframe内のPDF、遅延読み込み画像、fetch/XHRで取得されるファイル、blob URL、CMSダウンロードルート、hidden inputの値、39種類のdata-*属性まで網羅。通常のリンクスクレイパーでは拾えないファイルも検出します。さらにShadow DOM／Web Components内、SPAのハイドレーションデータ（Next.js・JSON-LD）、Cache Storage／OPFS／IndexedDB、署名付きクラウドストレージURL（Cloudflare R2・Firebase・Supabase・Vercel Blob）まで踏み込んで検出します。
        - generic [ref=f17e225]:
          - heading "スマートフィルタ" [level=3] [ref=f17e231]
          - paragraph [ref=f17e232]: 拡張子、ファイルサイズ、ファイル名、ページタイトル、更新日で絞り込み・並べ替え・手動並べ替え。URLのプレーンテキストコピーにも対応。
        - generic [ref=f17e233]:
          - heading "同一サイトクロール" [level=3] [ref=f17e241]
          - paragraph [ref=f17e242]: 深度0〜5または無制限を選んで、同一ドメインのリンク先を巡回。サブページに散らばったPDF、ビューアURL、CMS文書ルートまで一気に収集。1回の実行で最大10万ページまで。さらに sitemap.xml／robots.txt を解析し、JavaScriptメニュー（javascript:／onclick）・フレームセット・イメージマップ・GET検索/ページャのリンクも辿るので、通常の<a>リンクが無いページにも到達します。
        - generic [ref=f17e243]:
          - heading "PDF結合（ローカル）" [level=3] [ref=f17e249]
          - paragraph [ref=f17e250]: 選択したPDFを1つにまとめます。アップロード不要・サーバー送信なし。ファイルは端末から外に出ません。
        - generic [ref=f17e251]:
          - heading "ZIP化" [level=3] [ref=f17e256]
          - paragraph [ref=f17e257]: 選択したファイルを1つのZIPにまとめて配布・アーカイブ・共有しやすく。ブラウザ内ですべて完結します。
        - generic [ref=f17e258]:
          - heading "CSV出力" [level=3] [ref=f17e264]
          - paragraph [ref=f17e265]: URL、ファイル名、サイズ、種類、タイトルをCSV出力。資料台帳、棚卸し、報告書、後続の自動処理にそのまま使えます。
        - generic [ref=f17e266]:
          - heading "アクセス権のあるページをスキャン" [level=3] [ref=f17e272]
          - paragraph [ref=f17e273]: お使いのブラウザのセッションを利用し、すでに正当に開ける社内ポータル、LMS、会員ページ内の資料を確認できます。認証情報を収集したり、アクセス制御を回避したりするものではありません。
        - generic [ref=f17e274]:
          - heading "複雑なページにも対応" [level=3] [ref=f17e279]
          - paragraph [ref=f17e280]: 正当にアクセスできるページ内であれば、JavaScript描画のSPA（React・Next・Nuxt・Vue）、ビューア経由のURL、CSRF保護フォームなど、通常のダウンローダーが取りこぼす経路も確認します。種別は拡張子だけでなくバイト署名でも判定し、HTTP（非HTTPS）の旧サイトもスキャンできます。
        - generic [ref=f17e281]:
          - heading "大量処理に対応" [level=3] [ref=f17e287]
          - paragraph [ref=f17e288]: 複数URLを一度にスキャン、またはサイト全体をクロール。並列数の調整、一時停止/再開、失敗の自動リトライ、種類別・ドメイン別のフォルダ仕分け、PDFタイトルからのファイル名変更まで。
    - generic [ref=f17e290]:
      - generic [ref=f17e291]:
        - generic [ref=f17e292]: 使いどころ
        - generic [ref=f17e293]:
          - heading "他のダウンロードツールとの使い分け" [level=2] [ref=f17e294]
          - paragraph [ref=f17e295]: Grab All Files は万能ツールではなく、「複雑・動的・ログイン必須のページからファイルを見つける」ことに特化しています。ダウンロードマネージャやサイト複製ツールとの役割分担はこうです。
      - generic [ref=f17e297]:
        - generic [ref=f17e298]:
          - heading "複雑・ログイン必須ページからファイルを発見" [level=3] [ref=f17e303]
          - paragraph [ref=f17e304]:
            - text: iframe・ビューア・JavaScript・ログイン・CMSルートの奥に隠れたPDF・画像・文書。Grab All Files が検出し、絞り込み・選択のうえ、一括DL・PDF結合・ZIP化・CSV出力までローカルで完結します。
            - strong [ref=f17e305]: これこそ Grab All Files の得意分野です。
        - generic [ref=f17e306]:
          - generic [ref=f17e307]: 🚚
          - heading "既知のURLを大量に／巨大ファイルをDL" [level=3] [ref=f17e308]
          - paragraph [ref=f17e309]: 数GBのファイルや、キュー管理・再開が必要な長時間の無人バッチには、専用のダウンロードマネージャ（JDownloader、aria2）が最適です。Grab All Files でファイルを発見してURLリストを書き出し、重いDLはそちらに任せましょう。
        - generic [ref=f17e310]:
          - generic [ref=f17e311]: 🗺️
          - heading "サイト全体をオフライン閲覧用に複製" [level=3] [ref=f17e312]
          - paragraph [ref=f17e313]: 静的サイトを HTML・リンク・構造ごと複製してオフラインで閲覧したいなら、サイト複製ツール（HTTrack など）が適任です。Grab All Files が集めるのはファイルであり、サイトそのものの複製ではありません。
