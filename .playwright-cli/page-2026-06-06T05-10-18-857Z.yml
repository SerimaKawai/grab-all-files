      - generic [ref=e164]:
        - generic [ref=e165]: What it does
        - generic [ref=e166]:
          - heading "What it does" [level=2] [ref=e167]
          - paragraph [ref=e168]: Built for people who collect documents from many web pages — researchers, public-records archivists, internal-portal users, designers, students, and anyone tired of clicking "Save as…" hundreds of times.
      - generic [ref=e170]:
        - generic [ref=e171]:
          - generic [ref=e172]: 🔎
          - heading "Finds files others miss" [level=3] [ref=e173]
          - paragraph [ref=e174]: Detects iframe-embedded PDFs, lazy-loaded images, fetch/XHR file responses, blob URLs, CMS download routes, hidden form values, and 30+ data-* attributes that plain link scrapers ignore. Also reaches into Shadow DOM / Web Components, SPA hydration data (Next.js, JSON-LD), Cache Storage / OPFS / IndexedDB, and signed cloud-storage URLs (Cloudflare R2, Firebase, Supabase, Vercel Blob).
        - generic [ref=e175]:
          - generic [ref=e176]: ⚙️
          - heading "Smart filtering" [level=3] [ref=e177]
          - paragraph [ref=e178]: Filter results by extension, file size, file name, page title, or modification date. Sort, manually reorder, and copy URLs as plain text.
        - generic [ref=e179]:
          - generic [ref=e180]: 🕸️
          - heading "Same-site crawl" [level=3] [ref=e181]
          - paragraph [ref=e182]: Choose a depth (0–5 or unlimited) and visit every same-domain link to surface PDFs on subpages, viewer URLs, and CMS document routes — up to 10,000 pages per run. It also reads sitemap.xml / robots.txt and follows JavaScript-menu (javascript:/onclick), frameset, image-map, and GET search/pagination links, reaching pages that have no plain HTML links.
        - generic [ref=e183]:
          - generic [ref=e184]: 📚
          - heading "Local PDF merge" [level=3] [ref=e185]
          - paragraph [ref=e186]: Combine selected PDFs into a single file with one click. No upload, no server. Your files stay on your device.
        - generic [ref=e187]:
          - generic [ref=e188]: 🗜️
          - heading "ZIP archive" [level=3] [ref=e189]
          - paragraph [ref=e190]: Bundle selected files into a single ZIP for tidy distribution, archiving, or sharing — generated entirely in your browser.
        - generic [ref=e191]:
          - generic [ref=e192]: 📊
          - heading "CSV export" [level=3] [ref=e193]
          - paragraph [ref=e194]: Export URLs, file names, sizes, types, and titles to CSV for documentation, audit, inventory, or downstream automation.
        - generic [ref=e195]:
          - generic [ref=e196]: 🔐
          - heading "Scans pages you can access" [level=3] [ref=e197]
          - paragraph [ref=e198]: Uses your current browser session to scan intranets, LMS portals, and member-only pages you are already authorized to open. It does not collect credentials or override access controls.
        - generic [ref=e199]:
          - generic [ref=e200]: 🛡️
          - heading "Works on complex pages" [level=3] [ref=e201]
          - paragraph [ref=e202]: Handles JavaScript-rendered SPAs (React, Next, Nuxt, Vue), viewer routes, and CSRF-protected forms when they are part of pages you are authorized to access. It confirms file types by signature, not just extension, and can scan legacy HTTP pages.
        - generic [ref=e203]:
          - generic [ref=e204]: ⚙️
          - heading "Built for big jobs" [level=3] [ref=e205]
          - paragraph [ref=e206]: Scan many URLs at once or crawl an entire site, then control parallel downloads, pause/resume, auto-retry failures, sort into folders by type or domain, and rename files from their PDF title.
