      - generic [ref=f6e168]:
        - heading "複雑なページでも、より多くのファイルを見つけやすく。" [level=3] [ref=f6e169]
        - paragraph [ref=f6e170]: 最新のWebに合わせて設計し、こまめに更新しています。現在のリリースでは、深い検出、同一サイト収集、大量ダウンロード後のローカル出力機能を重点的に整理しています。
        - list [ref=f6e171]:
          - listitem [ref=f6e172]:
            - strong [ref=f6e173]: 新機能：
            - text: 失敗したファイルだけをワンクリックで一括再試行（完了しなかった分のみ再取得）。
          - listitem [ref=f6e174]:
            - strong [ref=f6e175]: 新機能：
            - text: パネルを閉じたりリロードしても、前回の結果を復元して続きから作業できます。
          - listitem [ref=f6e176]: iframe内PDF、遅延画像、fetch/XHRファイル、blob URL、CMSダウンロードルート、分割・マルチボリュームアーカイブまで幅広く検出。
          - listitem [ref=f6e177]: PDF結合・ZIP化・CSV出力はブラウザ内で完結し、ファイルをアップロードしません。
    - generic [ref=f6e179]:
      - generic [ref=f6e180]: 研究者
      - generic [ref=f6e186]: 公開資料の収集
      - generic [ref=f6e191]: 社内ポータル利用者
      - generic [ref=f6e196]: 学生
