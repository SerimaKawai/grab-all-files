      - generic [ref=f1e168]:
        - heading "複雑なページでも、より多くのファイルを見つけやすく。" [level=3] [ref=f1e169]
        - paragraph [ref=f1e170]: 最新のWebに合わせて設計し、こまめに更新しています。現在のリリースでは、深い検出、同一サイト収集、大量ダウンロード後のローカル出力機能を重点的に整理しています。
        - list [ref=f1e171]:
          - listitem [ref=f1e172]:
            - strong [ref=f1e173]: 新機能：
            - text: 失敗したファイルだけをワンクリックで一括再試行（完了しなかった分のみ再取得）。
          - listitem [ref=f1e174]:
            - strong [ref=f1e175]: 新機能：
            - text: パネルを閉じたりリロードしても、前回の結果を復元して続きから作業できます。
          - listitem [ref=f1e176]: iframe内PDF、遅延画像、fetch/XHRファイル、blob URL、CMSダウンロードルート、分割・マルチボリュームアーカイブまで幅広く検出。
          - listitem [ref=f1e177]: PDF結合・ZIP化・CSV出力はブラウザ内で完結し、ファイルをアップロードしません。
    - generic [ref=f1e179]:
      - generic [ref=f1e180]: 研究者
