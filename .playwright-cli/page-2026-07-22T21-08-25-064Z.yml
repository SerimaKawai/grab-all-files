      - generic [ref=f11e168]:
        - heading "複雑なページでも、より多くのファイルを見つけやすく。" [level=3] [ref=f11e169]
        - paragraph [ref=f11e170]: 最新のWebに合わせて設計し、こまめに更新しています。現在のリリースでは、深い検出、同一サイト収集、大量ダウンロード後のローカル出力機能を重点的に整理しています。
        - list [ref=f11e171]:
          - listitem [ref=f11e172]:
            - strong [ref=f11e173]: 新機能：
            - text: 失敗したファイルだけをワンクリックで一括再試行（完了しなかった分のみ再取得）。
          - listitem [ref=f11e174]:
            - strong [ref=f11e175]: 新機能：
            - text: パネルを閉じたりリロードしても、前回の結果を復元して続きから作業できます。
          - listitem [ref=f11e176]: iframe内PDF、遅延画像、fetch/XHRファイル、blob URL、CMSダウンロードルート、分割・マルチボリュームアーカイブまで幅広く検出。
          - listitem [ref=f11e177]: PDF結合・ZIP化・CSV出力はブラウザ内で完結し、ファイルをアップロードしません。
    - generic [ref=f11e179]:
      - generic [ref=f11e180]: 研究者
      - generic [ref=f11e186]: 公開資料の収集
      - generic [ref=f11e191]: 社内ポータル利用者
      - generic [ref=f11e196]: 学生
      - generic [ref=f11e202]: デザイナー
    - generic [ref=f11e211]:
      - generic [ref=f11e212]:
        - generic [ref=f11e213]: 主な機能
        - generic [ref=f11e214]:
          - heading "主な機能" [level=2] [ref=f11e215]
          - paragraph [ref=f11e216]: 複数ページから資料を集める人のためのツールです。調査・研究、自治体・大学公開資料の収集、社内ポータル業務、デザイン素材集め、論文・教材ダウンロードなど、「保存」を何度もクリックする作業から解放します。
      - generic [ref=f11e218]:
        - generic [ref=f11e219]:
          - heading "見落としがちなファイルも検出" [level=3] [ref=f11e224]
          - paragraph [ref=f11e225]:
            - strong [ref=f11e226]: 708種類（拡張子）
            - text: のファイルに対応。iframe内のPDF、遅延読み込み画像、fetch/XHRで取得されるファイル、blob URL、CMSダウンロードルート、hidden inputの値、39種類のdata-*属性まで網羅。通常のリンクスクレイパーでは拾えないファイルも検出します。さらにShadow DOM／Web Components内、SPAのハイドレーションデータ（Next.js・JSON-LD）、Cache Storage／OPFS／IndexedDB、署名付きクラウドストレージURL（Cloudflare R2・Firebase・Supabase・Vercel Blob）まで踏み込んで検出します。
        - generic [ref=f11e227]:
          - heading "スマートフィルタ" [level=3] [ref=f11e233]
          - paragraph [ref=f11e234]: 拡張子、ファイルサイズ、ファイル名、ページタイトル、更新日で絞り込み・並べ替え・手動並べ替え。URLのプレーンテキストコピーにも対応。
        - generic [ref=f11e235]:
          - heading "同一サイトクロール" [level=3] [ref=f11e243]
          - paragraph [ref=f11e244]: 深度0〜5または無制限を選んで、同一ドメインのリンク先を巡回。サブページに散らばったPDF、ビューアURL、CMS文書ルートまで一気に収集。1回の実行で最大10万ページまで。さらに sitemap.xml／robots.txt を解析し、JavaScriptメニュー（javascript:／onclick）・フレームセット・イメージマップ・GET検索/ページャのリンクも辿るので、通常の<a>リンクが無いページにも到達します。
        - generic [ref=f11e245]:
          - heading "PDF結合（ローカル）" [level=3] [ref=f11e251]
          - paragraph [ref=f11e252]: 選択したPDFを1つにまとめます。アップロード不要・サーバー送信なし。ファイルは端末から外に出ません。
        - generic [ref=f11e253]:
          - heading "ZIP化" [level=3] [ref=f11e258]
          - paragraph [ref=f11e259]: 選択したファイルを1つのZIPにまとめて配布・アーカイブ・共有しやすく。ブラウザ内ですべて完結します。
        - generic [ref=f11e260]:
          - heading "CSV出力" [level=3] [ref=f11e266]
          - paragraph [ref=f11e267]: URL、ファイル名、サイズ、種類、タイトルをCSV出力。資料台帳、棚卸し、報告書、後続の自動処理にそのまま使えます。
        - generic [ref=f11e268]:
          - heading "アクセス権のあるページをスキャン" [level=3] [ref=f11e274]
          - paragraph [ref=f11e275]: お使いのブラウザのセッションを利用し、すでに正当に開ける社内ポータル、LMS、会員ページ内の資料を確認できます。認証情報を収集したり、アクセス制御を回避したりするものではありません。
        - generic [ref=f11e276]:
          - heading "複雑なページにも対応" [level=3] [ref=f11e281]
          - paragraph [ref=f11e282]: 正当にアクセスできるページ内であれば、JavaScript描画のSPA（React・Next・Nuxt・Vue）、ビューア経由のURL、CSRF保護フォームなど、通常のダウンローダーが取りこぼす経路も確認します。種別は拡張子だけでなくバイト署名でも判定し、HTTP（非HTTPS）の旧サイトもスキャンできます。
        - generic [ref=f11e283]:
          - heading "大量処理に対応" [level=3] [ref=f11e289]
          - paragraph [ref=f11e290]: 複数URLを一度にスキャン、またはサイト全体をクロール。並列数の調整、一時停止/再開、失敗の自動リトライ、種類別・ドメイン別のフォルダ仕分け、PDFタイトルからのファイル名変更まで。
    - generic [ref=f11e292]:
      - generic [ref=f11e293]:
        - generic [ref=f11e294]: 使いどころ
        - generic [ref=f11e295]:
          - heading "他のダウンロードツールとの使い分け" [level=2] [ref=f11e296]
          - paragraph [ref=f11e297]: Grab All Files は万能ツールではなく、「複雑・動的・ログイン必須のページからファイルを見つける」ことに特化しています。ダウンロードマネージャやサイト複製ツールとの役割分担はこうです。
      - generic [ref=f11e299]:
        - generic [ref=f11e300]:
          - heading "複雑・ログイン必須ページからファイルを発見" [level=3] [ref=f11e305]
          - paragraph [ref=f11e306]:
            - text: iframe・ビューア・JavaScript・ログイン・CMSルートの奥に隠れたPDF・画像・文書。Grab All Files が検出し、絞り込み・選択のうえ、一括DL・PDF結合・ZIP化・CSV出力までローカルで完結します。
            - strong [ref=f11e307]: これこそ Grab All Files の得意分野です。
        - generic [ref=f11e308]:
          - generic [ref=f11e309]: 🚚
          - heading "既知のURLを大量に／巨大ファイルをDL" [level=3] [ref=f11e310]
          - paragraph [ref=f11e311]: 数GBのファイルや、キュー管理・再開が必要な長時間の無人バッチには、専用のダウンロードマネージャ（JDownloader、aria2）が最適です。Grab All Files でファイルを発見してURLリストを書き出し、重いDLはそちらに任せましょう。
        - generic [ref=f11e312]:
          - generic [ref=f11e313]: 🗺️
          - heading "サイト全体をオフライン閲覧用に複製" [level=3] [ref=f11e314]
          - paragraph [ref=f11e315]: 静的サイトを HTML・リンク・構造ごと複製してオフラインで閲覧したいなら、サイト複製ツール（HTTrack など）が適任です。Grab All Files が集めるのはファイルであり、サイトそのものの複製ではありません。
