    - generic [ref=e166]:
      - generic [ref=e167]:
        - generic [ref=e168]: 主な機能
        - generic [ref=e169]:
          - heading "主な機能" [level=2] [ref=e170]
          - paragraph [ref=e171]: 複数ページから資料を集める人のためのツールです。調査・研究、自治体・大学公開資料の収集、社内ポータル業務、デザイン素材集め、論文・教材ダウンロードなど、「保存」を何度もクリックする作業から解放します。
      - generic [ref=e173]:
        - generic [ref=e174]:
          - generic [ref=e175]: 🔎
          - heading "見落としがちなファイルも検出" [level=3] [ref=e176]
          - paragraph [ref=e177]: iframe内のPDF、遅延読み込み画像、fetch/XHRで取得されるファイル、blob URL、CMSダウンロードルート、hidden inputの値、30種類以上のdata-*属性まで網羅。通常のリンクスクレイパーでは拾えないファイルも検出します。さらにShadow DOM／Web Components内、SPAのハイドレーションデータ（Next.js・JSON-LD）、Cache Storage／OPFS／IndexedDB、署名付きクラウドストレージURL（Cloudflare R2・Firebase・Supabase・Vercel Blob）まで踏み込んで検出します。
        - generic [ref=e178]:
          - generic [ref=e179]: ⚙️
          - heading "スマートフィルタ" [level=3] [ref=e180]
          - paragraph [ref=e181]: 拡張子、ファイルサイズ、ファイル名、ページタイトル、更新日で絞り込み・並べ替え・手動並べ替え。URLのプレーンテキストコピーにも対応。
        - generic [ref=e182]:
          - generic [ref=e183]: 🕸️
          - heading "同一サイトクロール" [level=3] [ref=e184]
          - paragraph [ref=e185]: 深度0〜5または無制限を選んで、同一ドメインのリンク先を巡回。サブページに散らばったPDF、ビューアURL、CMS文書ルートまで一気に収集。1回の実行で最大1万ページまで。さらに sitemap.xml／robots.txt を解析し、JavaScriptメニュー（javascript:／onclick）・フレームセット・イメージマップ・GET検索/ページャのリンクも辿るので、通常の<a>リンクが無いページにも到達します。
        - generic [ref=e186]:
          - generic [ref=e187]: 📚
          - heading "PDF結合（ローカル）" [level=3] [ref=e188]
          - paragraph [ref=e189]: 選択したPDFを1つにまとめます。アップロード不要・サーバー送信なし。ファイルは端末から外に出ません。
        - generic [ref=e190]:
          - generic [ref=e191]: 🗜️
          - heading "ZIP化" [level=3] [ref=e192]
          - paragraph [ref=e193]: 選択したファイルを1つのZIPにまとめて配布・アーカイブ・共有しやすく。ブラウザ内ですべて完結します。
        - generic [ref=e194]:
          - generic [ref=e195]: 📊
          - heading "CSV出力" [level=3] [ref=e196]
          - paragraph [ref=e197]: URL、ファイル名、サイズ、種類、タイトルをCSV出力。資料台帳、棚卸し、報告書、後続の自動処理にそのまま使えます。
        - generic [ref=e198]:
          - generic [ref=e199]: 🔐
          - heading "アクセス権のあるページをスキャン" [level=3] [ref=e200]
          - paragraph [ref=e201]: お使いのブラウザのセッションを利用し、すでに正当に開ける社内ポータル、LMS、会員ページ内の資料を確認できます。認証情報を収集したり、アクセス制御を回避したりするものではありません。
        - generic [ref=e202]:
          - generic [ref=e203]: 🛡️
          - heading "複雑なページにも対応" [level=3] [ref=e204]
          - paragraph [ref=e205]: 正当にアクセスできるページ内であれば、JavaScript描画のSPA（React・Next・Nuxt・Vue）、ビューア経由のURL、CSRF保護フォームなど、通常のダウンローダーが取りこぼす経路も確認します。種別は拡張子だけでなくバイト署名でも判定し、HTTP（非HTTPS）の旧サイトもスキャンできます。
        - generic [ref=e206]:
          - generic [ref=e207]: ⚙️
          - heading "大量処理に対応" [level=3] [ref=e208]
          - paragraph [ref=e209]: 複数URLを一度にスキャン、またはサイト全体をクロール。並列数の調整、一時停止/再開、失敗の自動リトライ、種類別・ドメイン別のフォルダ仕分け、PDFタイトルからのファイル名変更まで。
