<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="https://grab-all-files.app/legal.html">
  <meta http-equiv="refresh" content="0; url=legal.html">
  <title>Legal Notice redirect - Grab All Files</title>
  <script>
    (function(){
      var supported = ['en','ja','es','fr','de','it','ko','pt_BR','zh_CN','zh_TW'];
      function fromUrl() {
        var m = location.search.match(/[?&]lang=([a-zA-Z_-]+)/);
        return m && supported.indexOf(m[1]) >= 0 ? m[1] : null;
      }
      function detect() {
        var u = fromUrl();
        if (u) return u;
        try {
          var s = localStorage.getItem('gaf-lang');
          if (supported.indexOf(s) >= 0) return s;
        } catch (_) {}
        var n = (navigator.language || '').toLowerCase();
        if (n.indexOf('ja') === 0) return 'ja';
        if (n.indexOf('ko') === 0) return 'ko';
        if (n.indexOf('it') === 0) return 'it';
        if (n.indexOf('de') === 0) return 'de';
        if (n.indexOf('es') === 0) return 'es';
        if (n.indexOf('fr') === 0) return 'fr';
        if (n.indexOf('pt') === 0) return 'pt_BR';
        if (n === 'zh-tw' || n === 'zh-hant' || n.indexOf('zh-hant') === 0) return 'zh_TW';
        if (n.indexOf('zh') === 0) return 'zh_CN';
        return 'en';
      }
      window.location.replace('legal.html?lang=' + encodeURIComponent(detect()));
    })();
  </script>
  <link rel="stylesheet" href="bloom-site.css">
</head>
<body>
  <p>Redirecting to <a href="legal.html">legal.html</a>…</p>
</body>
</html>
