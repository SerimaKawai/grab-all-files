<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="noindex, follow">
  <title>What's new - Grab All Files</title>
  <!-- The extension's "what's new" banner links here after an update.
       The curated, multilingual release notes live in the #latest-version
       section on the home page, so send visitors straight there. -->
  <link rel="canonical" href="https://grab-all-files.app/">
  <meta http-equiv="refresh" content="0; url=/#latest-version">
  <link rel="icon" type="image/png" sizes="128x128" href="../favicon-128.png">
  <style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      background: #f5f7fb; color: #2c3650;
    }
    @media (prefers-color-scheme: dark) { body { background: #080b14; color: #c2cbdd; } }
    .box { text-align: center; padding: 2rem; }
    a { color: #2f55ec; }
    @media (prefers-color-scheme: dark) { a { color: #5e7dff; } }
  </style>
  <script>
    // Instant, history-clean redirect (back button skips this stub).
    location.replace("/#latest-version");
  </script>
  <link rel="stylesheet" href="../bloom-site.css">
</head>
<body>
  <div class="box">
    <p>Redirecting to the latest release notes…</p>
    <p><a href="/#latest-version">View what&rsquo;s new in Grab All Files</a></p>
  </div>
</body>
</html>
